<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Componente responsive de login construido con HTML y CSS." />
  <title>AdminExpress | Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <section class="login-card" aria-label="Pantalla de inicio de sesión">
      <aside class="brand-panel" aria-label="Identidad de marca">
        <div class="brand-panel__content">
          <span class="brand-badge">AdminExpress</span>
          <p class="brand-copy">Panel administrativo moderno, limpio y adaptable.</p>
        </div>
      </aside>

      <section class="form-panel">
        <div class="form-panel__content">
          <header class="form-header">
            <p class="form-eyebrow">Bienvenido</p>
            <h1>Let’s Sign In <span aria-hidden="true">👇</span></h1>
            <p class="form-subtitle">Hey, Enter your details to get sign in to your account.</p>
          </header>

          <form class="login-form" action="#" method="post" novalidate>
            <div class="field-group">
              <label for="email">Email</label>
              <div class="input-wrapper">
                <span class="input-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M4 6.75A2.75 2.75 0 0 1 6.75 4h10.5A2.75 2.75 0 0 1 20 6.75v10.5A2.75 2.75 0 0 1 17.25 20H6.75A2.75 2.75 0 0 1 4 17.25V6.75Zm1.5.33v.15l6.07 4.43a.75.75 0 0 0 .86 0l6.07-4.43v-.15a1.25 1.25 0 0 0-1.25-1.25H6.75A1.25 1.25 0 0 0 5.5 7.08Zm13 1.99-5.18 3.78a2.25 2.25 0 0 1-2.64 0L5.5 9.07v8.18c0 .69.56 1.25 1.25 1.25h10.5c.69 0 1.25-.56 1.25-1.25V9.07Z"/>
                  </svg>
                </span>
                <input id="email" name="email" type="email" placeholder="Enter Email" autocomplete="email" />
              </div>
            </div>

            <div class="field-group">
              <label for="password">Password</label>
              <div class="input-wrapper">
                <span class="input-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M7.5 9V7.5a4.5 4.5 0 1 1 9 0V9h.75A2.75 2.75 0 0 1 20 11.75v6.5A2.75 2.75 0 0 1 17.25 21h-10.5A2.75 2.75 0 0 1 4 18.25v-6.5A2.75 2.75 0 0 1 6.75 9h.75Zm1.5 0H15V7.5a3 3 0 1 0-6 0V9Zm3 3a1.75 1.75 0 0 1 1 3.18V17a.75.75 0 0 1-1.5 0v-1.82A1.75 1.75 0 0 1 12 12Z"/>
                  </svg>
                </span>
                <input id="password" name="password" type="password" placeholder="Enter Password" autocomplete="current-password" />
                <button class="ghost-icon" type="button" aria-label="Mostrar contraseña">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M12 5c4.97 0 8.27 4.23 9.46 6.02.2.3.2.66 0 .96C20.27 13.77 16.97 18 12 18S3.73 13.77 2.54 11.98a.86.86 0 0 1 0-.96C3.73 9.23 7.03 5 12 5Zm0 1.5c-3.88 0-6.72 3.18-7.9 4.98 1.18 1.8 4.02 5.02 7.9 5.02 3.88 0 6.72-3.22 7.9-5.02-1.18-1.8-4.02-4.98-7.9-4.98Zm0 2.25a2.75 2.75 0 1 1 0 5.5 2.75 2.75 0 0 1 0-5.5Zm0 1.5a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5Z"/>
                  </svg>
                </button>
              </div>
            </div>

            <div class="form-actions">
              <a href="#" class="text-link">Forgot password?</a>
            </div>

            <button class="submit-button" type="submit">Sign In</button>

            <p class="form-footer">
              Don’t have an account?
              <a href="#" class="text-link text-link--strong">Sign Up</a>
            </p>
          </form>
        </div>
      </section>
    </section>
  </main>
</body>
</html>
